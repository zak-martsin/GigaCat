included:
  - GigaCat
  - GigaCatTests
  - GigaCatUITests

excluded:
  - .build
  - DerivedData

reporter: "xcode"

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 700

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

identifier_name:
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - xs
    - sm
    - md
    - lg
    - xl
    
disabled_rules:
  - todo

